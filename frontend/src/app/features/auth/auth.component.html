<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark" style="background:var(--pine);color:var(--pine-ink);width:44px;height:44px;border-radius:12px">
        <app-icon name="ledger" [size]="26" [weight]="1.6" />
      </span>
      <div>
        <div style="font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.02em">Ledgerly</div>
        <div class="faint" style="font-size:13px">The accountant’s assistant · EU</div>
      </div>
    </div>

    <div class="auth-tabs">
      <button [class.on]="mode() === 'login'" (click)="switch('login')">Sign in</button>
      <button [class.on]="mode() === 'register'" (click)="switch('register')">Create firm</button>
    </div>

    <form (submit)="submit($event)">
      @if (mode() === 'register') {
        <label class="field">
          <span>Firm / workspace name</span>
          <input type="text" [value]="tenant()" (input)="set(tenant, $event)"
                 placeholder="e.g. Acme Accounting OOD" required autocomplete="organization" />
        </label>
      }
      <label class="field">
        <span>Email</span>
        <input type="email" [value]="email()" (input)="set(email, $event)"
               placeholder="you@firm.bg" required autocomplete="email" />
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" [value]="password()" (input)="set(password, $event)"
               placeholder="At least 8 characters" required minlength="8"
               [attr.autocomplete]="mode() === 'login' ? 'current-password' : 'new-password'" />
      </label>

      @if (error()) { <div class="auth-error"><app-icon name="alert" [size]="14" /> {{ error() }}</div> }

      <button class="btn primary block" type="submit" [disabled]="busy()">
        {{ busy() ? 'Please wait…' : mode() === 'login' ? 'Sign in' : 'Create firm & continue' }}
      </button>
    </form>

    <div class="auth-foot faint">
      Your data stays isolated per firm (Postgres Row-Level Security) and never leaves your workspace.
    </div>
  </div>
</div>
