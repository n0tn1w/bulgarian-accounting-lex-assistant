<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark" style="background:var(--pine);color:var(--pine-ink);width:44px;height:44px;border-radius:12px">
        <app-icon name="ledger" [size]="26" [weight]="1.6" />
      </span>
      <div>
        <div style="font-family:var(--display);font-size:26px;font-weight:600;letter-spacing:-.02em">Ledgerly</div>
        <div class="faint" style="font-size:13px">{{ 'auth.sub' | t }}</div>
      </div>
    </div>

    <div class="auth-tabs">
      <button [class.on]="mode() === 'login'" (click)="switch('login')">{{ 'auth.login' | t }}</button>
      <button [class.on]="mode() === 'register'" (click)="switch('register')">{{ 'auth.register' | t }}</button>
    </div>

    <form (submit)="submit($event)">
      @if (mode() === 'register') {
        <label class="field">
          <span>{{ 'auth.firmName' | t }}</span>
          <input type="text" [value]="tenant()" (input)="set(tenant, $event)"
                 [placeholder]="'auth.firmPlaceholder' | t" required autocomplete="organization" />
        </label>
      }
      <label class="field">
        <span>{{ 'auth.email' | t }}</span>
        <input type="email" [value]="email()" (input)="set(email, $event)"
               [placeholder]="'auth.emailPlaceholder' | t" required autocomplete="email" />
      </label>
      <label class="field">
        <span>{{ 'auth.password' | t }}</span>
        <input type="password" [value]="password()" (input)="set(password, $event)"
               [placeholder]="'auth.passwordPlaceholder' | t" required minlength="8"
               [attr.autocomplete]="mode() === 'login' ? 'current-password' : 'new-password'" />
      </label>

      @if (error()) { <div class="auth-error"><app-icon name="alert" [size]="14" /> {{ error() }}</div> }

      <button class="btn primary block" type="submit" [disabled]="busy()">
        {{ (busy() ? 'auth.wait' : mode() === 'login' ? 'auth.submitLogin' : 'auth.submitRegister') | t }}
      </button>
    </form>

    <div class="auth-foot faint">
      {{ 'auth.foot' | t }}
    </div>
  </div>
</div>
