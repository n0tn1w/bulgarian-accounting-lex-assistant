server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy all API calls to the backend service.
    # The Angular app is built with window.__LEDGERLY_API_BASE__ = "/api", so
    # every SDK call is /api/<path>; nginx strips the prefix before forwarding.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # LLM chat responses can be slow; allow up to 120 s.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Angular SPA: fall back to index.html for all client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve pre-compressed assets when available.
    gzip_static on;

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
}
