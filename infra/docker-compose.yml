# Local dev infrastructure for Ledgerly.
#   docker compose -f infra/docker-compose.yml up -d
#
# Postgres 16 with the pgvector extension preinstalled (pgvector/pgvector image).
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ledgerly-db
    environment:
      POSTGRES_USER: ledgerly
      POSTGRES_PASSWORD: ledgerly
      POSTGRES_DB: ledgerly
    ports:
      - "5432:5432"
    volumes:
      - ledgerly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerly -d ledgerly"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ledgerly_pgdata:
