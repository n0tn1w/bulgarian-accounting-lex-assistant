# Production docker-compose stack for Ledgerly (Accounting AI Assistant).
#
# Usage:
#   docker compose up --build          # first run: builds images, initialises DB
#   docker compose up -d               # subsequent starts (no rebuild)
#
# The only host port is 8080 (nginx / frontend). All other services
# communicate over the private `ledgerly` bridge network.
#
# Optional LLM keys (Claude, OpenAI) can be supplied via a root-level .env file
# or by exporting them before running docker compose:
#   ANTHROPIC_API_KEY=sk-ant-...  docker compose up --build
#
# Required override for production:
#   JWT_SECRET: change from the default before any real deployment.

services:

  # Postgres 16 + pgvector
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER:     ledgerly
      POSTGRES_PASSWORD: ledgerly
      POSTGRES_DB:       ledgerly
    volumes:
      - ledgerly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ledgerly -d ledgerly"]
      interval: 5s
      timeout:  3s
      retries:  10
    networks:
      - ledgerly
    # DB must not publish a host port in production; apps talk via the network alias.

  # FastAPI backend
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    environment:
      # Admin role: runs DDL / bootstrap (pgvector extension, tables, RLS).
      DATABASE_ADMIN_URL: postgresql+psycopg://ledgerly:ledgerly@db:5432/ledgerly
      # App role: NOSUPERUSER, so Row-Level Security is enforced for all queries.
      DATABASE_URL:       postgresql+psycopg://ledgerly_app:ledgerly_app@db:5432/ledgerly
      APP_DB_PASSWORD:    ledgerly_app

      # Auth: override before any real deployment.
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}

      # LLM integration. With a hosted model + key it uses that; left empty it falls
      # back to the bundled `ollama` Mistral container, so chat works without an API key.
      # Examples for a hosted model:
      #   LLM_MODEL=claude-3-5-sonnet-latest  + ANTHROPIC_API_KEY
      #   LLM_MODEL=gpt-4o-mini               + OPENAI_API_KEY
      LLM_MODEL:        ${LLM_MODEL:-}
      LLM_API_BASE:     ${LLM_API_BASE:-}
      # Generic provider key (e.g. Gemini); the invoice agent passes it to LiteLLM.
      LLM_API_KEY:      ${LLM_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      # Containerized fallback model (the ollama service below).
      LLM_FALLBACK_MODEL:    ${LLM_FALLBACK_MODEL:-ollama/mistral}
      LLM_FALLBACK_API_BASE: ${LLM_FALLBACK_API_BASE:-http://ollama:11434}
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ledgerly
    volumes:
      # Persist the lex laws index and downloaded models across restarts.
      # Build the index once: docker compose run --rm backend python lex/run_ingest.py
      - lex_index:/app/lex/storage
      - hf_cache:/root/.cache/huggingface
    # Backend is not exposed to the host; nginx proxies /api/ to backend:8000.

  # Local LLM (containerized Mistral). The backend uses this automatically when no
  # hosted LLM_MODEL/API key is configured, so production has a working model out of
  # the box. Override with a hosted model + key for higher quality.
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test:     ["CMD", "ollama", "list"]
      interval: 10s
      timeout:  5s
      retries:  12
    networks:
      - ledgerly

  # One-shot: pull the Mistral model into the ollama service on first boot, then exit.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${LLM_FALLBACK_PULL:-mistral}"]
    restart: "no"
    networks:
      - ledgerly

  # Angular SPA + nginx reverse proxy (public entry point)
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - ledgerly

networks:
  ledgerly:
    driver: bridge

volumes:
  ledgerly_pgdata:
  lex_index:
  hf_cache:
  ollama_models:
